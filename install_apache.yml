- hosts: all
  become: true
  tasks:


    - name: install updates (ubuntu)
      tags: always
      apt:
        upgrade: yes
        update_cache: yes
      when: ansible_distribution == "Ubuntu"



    - name: install updates (redhat)
      tags: always
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_distribution == "RedHat"


- hosts: all
  become: true
  tasks:
 
    - name: create users
      tags: always
      user:
        name: simone
        groups: root
        

    - name: add ssh key for simone
      tags: always
      authorized_key:
        user: simone
        key:  "ssh-rsa  root@Emad
"

    - name: add sudoers file for simone
      tags: always
      copy:
        content: "simone ALL=(ALL) NOPASSWD: ALL 

          "
        dest: /etc/sudoers.d/simone
        owner: root
        group: root
        mode: '0440'

- hosts: web_servers
  become: true
  tasks:

    - name: install httpd package (redhat)
      tags: apache,httpd
      dnf:
        name: httpd
        state: present
      when: ansible_distribution == "RedHat"

    - name: start and enable httpd (redhat)
      tags: apache,httpd
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_distribution == "RedHat"

    - name: change email in httpd.conf
      tags: apache,httpd
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^ServerAdmin'
        line: 'ServerAdmin somee@simee.net'
        backup: yes
      when: ansible_distribution == "RedHat"
      register: httpd

    - name: restart httpd
      tags: apache,httpd
      service:
        name: httpd
        state: restarted
      when: httpd is defined and httpd.changed

    - name: install apache2 package (ubuntu)
      tags: apache,apache2
      apt:
        name: apache2
        state: present
      when: ansible_distribution == "Ubuntu"

    - name: start and enable apache2 (ubuntu)
      tags: apache,apache2
      service:
        name: apache2
        state: started
        enabled: yes
      when: ansible_distribution == "Ubuntu"

    - name: copy the html file to server
      tags: apache,apache2,httpd
      copy:
        src: default_site.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: 0644

- hosts: db_servers
  become: true
  tasks:

    - name: install mariadb
      tags: centos,db,mariadb
      dnf:
        name: mariadb
        state: present
      when: ansible_distribution == "RedHat"
